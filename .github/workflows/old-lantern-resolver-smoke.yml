name: Old Lantern resolver smoke

on:
  pull_request:
    paths:
      - 'src/engine/OldLanternAssetPack.js'
      - 'src/engine/Phase8AssetResolver.js'
      - 'src/sim/OldLanternInnSystem.js'
      - 'src/sim/OldLanternRuntimeBridge.js'
      - 'tests/old-lantern-resolver-smoke.mjs'
      - 'package.json'
      - '.github/workflows/old-lantern-resolver-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'src/engine/OldLanternAssetPack.js'
      - 'src/engine/Phase8AssetResolver.js'
      - 'src/sim/OldLanternInnSystem.js'
      - 'src/sim/OldLanternRuntimeBridge.js'
      - 'tests/old-lantern-resolver-smoke.mjs'
      - 'package.json'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check syntax
        run: |
          node --check src/engine/OldLanternAssetPack.js
          node --check src/engine/Phase8AssetResolver.js
          node --check src/sim/OldLanternInnSystem.js
          node --check src/sim/OldLanternRuntimeBridge.js
          node --check tests/old-lantern-resolver-smoke.mjs
      - name: Test Old Lantern contracts
        run: npm run test:old-lantern
