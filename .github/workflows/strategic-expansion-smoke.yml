name: Strategic Expansion Smoke

on:
  pull_request:
  push:
    branches: [agent/strategic-expansion-foundations]

jobs:
  strategic-expansion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run test:expansion
      - name: Camp life immersion smoke
        id: camp_life
        shell: bash
        run: |
          set +e
          npm run test:camp-life > camp-life-smoke.log 2>&1
          status=$?
          cat camp-life-smoke.log
          exit $status
      - name: Upload camp life smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: camp-life-smoke-log
          path: camp-life-smoke.log
      - run: npm run test:phase8b
