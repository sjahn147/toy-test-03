name: Strategic Expansion Smoke

on:
  pull_request:
  push:
    branches: [agent/strategic-expansion-foundations]

jobs:
  strategic-expansion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run test:expansion
      - run: npm run test:phase8b
