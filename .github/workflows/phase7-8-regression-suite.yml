name: Phase 7-8 Regression Suite

on:
  push:
    branches: [main]
  pull_request:

jobs:
  phase7-8-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate territory contest behavior
        run: npm run test:phase7
      - name: Validate settlement collapse behavior
        run: npm run test:phase8
      - name: Validate spatial logistics behavior
        run: npm run test:phase8c
