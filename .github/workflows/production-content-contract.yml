name: Production content contract

on:
  push:
    paths:
      - 'content/**'
      - 'docs/**'
      - 'tools/validate-production-content.mjs'
      - 'package.json'
      - '.github/workflows/production-content-contract.yml'
  pull_request:
    paths:
      - 'content/**'
      - 'docs/**'
      - 'tools/validate-production-content.mjs'
      - 'package.json'
      - '.github/workflows/production-content-contract.yml'

jobs:
  validate-production-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run validate:production-content
