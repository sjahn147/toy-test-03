name: Campaign map integration audit

on:
  pull_request:
    paths:
      - 'content/campaigns/sleeping-citadel/**'
      - 'content/assets/asset-catalog.json'
      - 'src/content/**'
      - 'src/engine/**'
      - 'tests/campaign-map-integration-audit.mjs'
      - 'package.json'
      - '.github/workflows/campaign-map-integration-audit.yml'
  push:
    branches: [main]
    paths:
      - 'content/campaigns/sleeping-citadel/**'
      - 'content/assets/asset-catalog.json'
      - 'src/content/**'
      - 'src/engine/**'
      - 'tests/campaign-map-integration-audit.mjs'
      - 'package.json'
      - '.github/workflows/campaign-map-integration-audit.yml'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax
        run: node --check tests/campaign-map-integration-audit.mjs
      - name: Audit all 63 campaign rooms
        run: npm run test:campaign-map
