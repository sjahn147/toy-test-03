name: WP8-C Field Physics and Frontline Heroes

on:
  pull_request:
    paths:
      - 'src/content/heroes/**'
      - 'src/engine/heroes/**'
      - 'src/sim/heroes/**'
      - 'src/sim/DungeonSimulation.js'
      - 'src/sim/CombatSystem.js'
      - 'src/sim/DungeonSimPhase3.js'
      - 'src/engine/DungeonRenderer.js'
      - 'src/domain/snapshotContract.js'
      - 'src/compat/normalizeLegacySnapshot.js'
      - 'content/campaigns/sleeping-citadel/faction-heroes.json'
      - 'tests/wp8c-*.mjs'
      - 'package.json'
  workflow_dispatch:

jobs:
  wp8c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --ignore-scripts
      - run: npm run test:wp8b
      - run: npm run test:wp8c
      - run: npm run test:production
