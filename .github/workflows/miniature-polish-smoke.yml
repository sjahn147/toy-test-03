name: Miniature polish smoke

on:
  push:
    paths:
      - 'src/engine/PolishedMiniatureFactory.js'
      - 'src/engine/MiniatureAnimator.js'
      - 'src/engine/AssetRegistryPhase8.js'
      - 'src/engine/DungeonRendererPhase8.js'
      - 'src/miniatures/recipes.js'
      - 'tests/miniature-polish-smoke.mjs'
      - 'package.json'
      - '.github/workflows/miniature-polish-smoke.yml'
  pull_request:
    paths:
      - 'src/engine/PolishedMiniatureFactory.js'
      - 'src/engine/MiniatureAnimator.js'
      - 'src/engine/AssetRegistryPhase8.js'
      - 'src/engine/DungeonRendererPhase8.js'
      - 'src/miniatures/recipes.js'
      - 'tests/miniature-polish-smoke.mjs'
      - 'package.json'
      - '.github/workflows/miniature-polish-smoke.yml'

jobs:
  miniature-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: |
          node --check src/engine/PolishedMiniatureFactory.js
          node --check src/engine/MiniatureAnimator.js
          node --check src/engine/AssetRegistryPhase8.js
          node --check src/engine/DungeonRendererPhase8.js
          node --check src/miniatures/recipes.js
          node --check tests/miniature-polish-smoke.mjs
      - name: Test miniature contracts
        run: npm run test:miniatures
