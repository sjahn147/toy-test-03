name: Campaign landmark placement audit

on:
  pull_request:
    paths:
      - 'src/engine/CampaignCompletion*.js'
      - 'src/engine/Phase8AssetResolver.js'
      - 'src/engine/AssetRegistryPhase8.js'
      - 'src/engine/DungeonRendererPhase8.js'
      - 'tests/campaign-landmark-placement-audit.mjs'
      - 'docs/handoff/developer-3-campaign-landmarks.md'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'src/engine/CampaignCompletion*.js'
      - 'src/engine/Phase8AssetResolver.js'
      - 'src/engine/AssetRegistryPhase8.js'
      - 'src/engine/DungeonRendererPhase8.js'
      - 'tests/campaign-landmark-placement-audit.mjs'
      - 'docs/handoff/developer-3-campaign-landmarks.md'
      - 'package.json'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax
        run: |
          node --check src/engine/CampaignCompletionStateOverlays.js
          node --check src/engine/CampaignCompletionAssetPack.js
          node --check tests/campaign-landmark-placement-audit.mjs
      - name: Placement and wiring contracts
        run: npm run test:campaign-placement
      - name: Asset contracts
        run: npm run test:campaign-completion
