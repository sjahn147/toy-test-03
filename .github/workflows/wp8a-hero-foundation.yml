name: WP8-A Hero Foundation

on:
  pull_request:
    paths:
      - 'src/content/heroes/**'
      - 'src/sim/heroes/**'
      - 'src/engine/heroes/**'
      - 'content/campaigns/sleeping-citadel/faction-heroes.json'
      - 'tests/wp8a-*.mjs'
      - 'package.json'
  workflow_dispatch:

jobs:
  hero-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:wp8a
