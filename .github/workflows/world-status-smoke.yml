name: World Status Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  world-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:world-status
      - run: npm run test:expansion
      - run: npm run test:operations
      - run: npm run test:miniatures
