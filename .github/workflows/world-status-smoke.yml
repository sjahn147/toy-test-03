name: World Status Smoke

on:
  pull_request:
    paths:
      - 'src/domain/OutpostProfiles.js'
      - 'src/engine/ForwardOutpostAssetFactory.js'
      - 'src/engine/WorldStatusOverlayRenderer.js'
      - 'src/engine/StrategyAssetRegistry.js'
      - 'src/engine/StrategyDungeonRenderer.js'
      - 'src/screens/ObserveScreenPhase8.js'
      - 'src/sim/StrategicExpansionSystem.js'
      - 'tests/world-status-outposts-smoke.mjs'
      - 'package.json'
      - '.github/workflows/world-status-smoke.yml'
  workflow_dispatch:

jobs:
  world-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:world-status
      - run: npm run test:expansion
      - run: npm run test:operations
      - run: npm run test:miniatures
