name: World Interaction WP1

on:
  pull_request:
  workflow_dispatch:

jobs:
  world-interaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:world-interaction
      - run: npm run test:facade
      - run: npm run test:presentation
      - run: npm run test:campaign-map
