name: Phase 8C Logistics Spatial Smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  logistics-spatial-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run test:phase8c
