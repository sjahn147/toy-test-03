name: Campaign completion assets

on:
  pull_request:
    paths:
      - 'src/engine/CampaignCompletion*.js'
      - 'src/engine/Phase8AssetResolver.js'
      - 'tests/campaign-completion-assets-smoke.mjs'
      - 'content/campaigns/sleeping-citadel/campaign.manifest.json'
      - 'content/assets/asset-catalog.json'
      - 'docs/handoff/developer-3-campaign-landmarks.md'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'src/engine/CampaignCompletion*.js'
      - 'src/engine/Phase8AssetResolver.js'
      - 'tests/campaign-completion-assets-smoke.mjs'
      - 'content/campaigns/sleeping-citadel/campaign.manifest.json'
      - 'content/assets/asset-catalog.json'
      - 'docs/handoff/developer-3-campaign-landmarks.md'
      - 'package.json'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax
        run: |
          node --check src/engine/CampaignCompletionLandmarkRecipes.js
          node --check src/engine/CampaignCompletionDioramas.js
          node --check src/engine/CampaignCompletionAssetPack.js
          node --check src/engine/Phase8AssetResolver.js
          node --check tests/campaign-completion-assets-smoke.mjs
      - name: Contracts
        run: npm run test:campaign-completion
