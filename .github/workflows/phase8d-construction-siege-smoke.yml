name: Phase 8D Construction Siege Smoke

on:
  push:
    paths:
      - 'src/**'
      - 'tests/phase8d-construction-siege-smoke.mjs'
      - 'package.json'
      - '.github/workflows/phase8d-construction-siege-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run test:phase8d
